name: Backend - Deploy to Dev Environment

on:
  push:
    branches:
      - dev
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    environment: dev
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Run EF Core migrations
        run: |
          dotnet tool install --global dotnet-ef --version 10.0.2 || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef database update \
            --project Winfocus.LMS.Infrastructure \
            --connection="$DB_CONNECTION_STRING" \
            --configuration Release
        env:
          DB_CONNECTION_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          DOTNET_CLI_TELEMETRY_OPTOUT: "1"

      - name: Publish
        run: dotnet publish --no-build --configuration Release --output ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: dev
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App (Dev)
        uses: azure/webapps-deploy@v3
        with:
          app-name: aiserwin-api-dev
          slot-name: Production
          package: .
