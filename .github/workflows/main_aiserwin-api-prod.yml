name: Backend - Deploy to Production Environment

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    environment: production
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build
        run: dotnet build --configuration Release

      - name: Publish
        run: dotnet publish -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: .net-app

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_9D5DE6AA651D4C1BB8670A131951F14F }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_36DE54FAE8084C7D82CFFEB20D6B5752 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_C6E3E231436749178A1E63522EE2DFDB }}

      - name: Run EF Core migrations
        run: |
          dotnet tool install --global dotnet-ef --version 10.0.2 || true
          export PATH="$PATH:$HOME/.dotnet/tools"
          dotnet ef database update --project Winfocus.LMS.Infrastructure
        env:
          DB_CONNECTION_STRING: ${{ secrets.AZURE_SQL_CONNECTION_STRING }}
          DOTNET_CLI_TELEMETRY_OPTOUT: "1"

      - name: Deploy to Azure Web App (Production)
        uses: azure/webapps-deploy@v3
        with:
          app-name: aiserwin-api-prod
          slot-name: Production
          package: .
